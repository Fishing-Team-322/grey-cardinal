# Grey Cardinal Desktop Agent — config.example.toml
# Copy to %LOCALAPPDATA%\GreyCardinal\Daemon\config.toml and edit.

# Backend URL (set automatically after pairing, e.g. https://fishingteam.su)
backend_url = "http://localhost:8000"

# Agent identifier sent with every upload
agent_id = "desktop-agent-001"

# --- Account pairing (written by the tray "Pair device" flow, do not edit by hand) ---
# device_name  — shown in the cockpit agents list
# workspace_id — workspace this daemon is bound to
# agent_token  — per-device bearer token (X-Agent-Token); keep secret, never share
device_name = ""
workspace_id = ""
agent_token = ""

# Meeting ID; leave empty to auto-generate UUID on each recording session
meeting_id = ""

# Capture mode: microphone (default) | system_loopback
capture_mode = "microphone"

# Select specific input device (optional)
# input_device_id = ""
# input_device_index = -1
# input_device_name = ""

# Record for N seconds then stop automatically (0 = until Ctrl+C)
duration_sec = 0

# Directory where WAV files are saved after recording
# Leave empty to use %TEMP%\grey-cardinal
output_dir = ""

# If true: record and save WAV locally but skip upload (for testing)
dry_run = false
