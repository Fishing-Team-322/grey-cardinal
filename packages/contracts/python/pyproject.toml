[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "grey-cardinal-contracts"
version = "0.1.0"
description = "Общие межсервисные контракты Grey Cardinal (Pydantic v2)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6,<3",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["grey_cardinal_contracts*"]
