<div class="page pet-page" id="pet-page">
<style>
  /* ===== Pet palette (gamification corner) ===== */
  .pet-page{
    --pv:#8b5cf6; --pv2:#a78bfa; --pc:#22d3ee; --pt:#2dd4bf; --pb:#4493F8;
    --pet-glow: rgba(139,92,246,0.45);
    --rc-common:#94a3b8; --rc-rare:#38bdf8; --rc-epic:#a78bfa; --rc-legendary:#f5b642;
    max-width:1240px;
  }
  /* page header */
  .pet-page .ph{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:26px; }
  .pet-page .ph h1{ font-size:32px; }
  .pet-page .ph .sub{ color:var(--text-dim); margin-top:8px; max-width:620px; font-size:15px; }
  .pet-page .ph-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  /* section heading */
  .pet-page .sh{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin:34px 0 16px; }
  .pet-page .sh h2{ font-size:21px; letter-spacing:-0.03em; display:flex; align-items:center; gap:10px; }
  .pet-page .sh .si{ width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:var(--accent-soft);color:var(--pv2); }
  .pet-page .sh .si svg{ width:15px;height:15px; }
  /* ===== HERO ===== */
  .pet-page .hero-grid{ display:grid; grid-template-columns:1.32fr 1fr; gap:16px; align-items:stretch; }
  .pet-page .pet-card{
    position:relative; overflow:hidden; border-radius:var(--r-xl);
    border:1px solid rgba(139,92,246,0.28);
    background:
      radial-gradient(120% 90% at 30% 8%, rgba(139,92,246,0.20), transparent 55%),
      radial-gradient(120% 100% at 90% 100%, rgba(34,211,238,0.12), transparent 50%),
      linear-gradient(180deg, var(--surface), var(--bg-2));
    box-shadow: var(--shadow-lg); padding:24px; display:flex; flex-direction:column; }
  .pet-page .pet-card::after{ content:""; position:absolute; inset:0; border-radius:var(--r-xl);
    box-shadow: inset 0 0 120px rgba(139,92,246,0.10); pointer-events:none; }
  .pet-page .pc-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; position:relative; z-index:2; }
  .pet-page .pet-stage{ position:relative; flex:1; display:grid; place-items:center; padding:14px 0 6px; min-height:300px; }
  .pet-page .pet-aura{ position:absolute; width:340px; height:340px; border-radius:50%;
    background:radial-gradient(circle, rgba(139,92,246,0.30), transparent 62%);
    animation:auraPulse 4.5s ease-in-out infinite; }
  @keyframes auraPulse{0%,100%{transform:scale(.96);opacity:.85}50%{transform:scale(1.06);opacity:1}}
  .pet-page .pet-float{ position:relative; z-index:2; animation:petFloat 5s ease-in-out infinite; }
  @keyframes petFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .pet-page .pet-orbit{ animation:orbit 6s ease-in-out infinite; }
  @keyframes orbit{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-7px) rotate(10deg)}}
  .pet-page .pet-flame{ animation:flame 1.1s ease-in-out infinite; }
  @keyframes flame{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.28)}}
  .pet-page .pet-ground{ position:absolute; bottom:18px; width:160px; height:14px; border-radius:50%;
    background:radial-gradient(circle, rgba(139,92,246,0.4), transparent 70%); filter:blur(3px); }
  /* equipped accessory animations (overlay svg) */
  .pet-page .pet-scene{ display:inline-block; }
  .pet-page .acc-bob{ animation:accBob 5s ease-in-out infinite; transform-origin:center; }
  @keyframes accBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
  .pet-page .acc-spark > *{ animation:accSpark 2.4s ease-in-out infinite; transform-origin:center; }
  @keyframes accSpark{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)}}
  .pet-page .acc-spin{ animation:accSpin 9s linear infinite; }
  @keyframes accSpin{to{transform:rotate(360deg)}}
  .pet-page .acc-orbit{ animation:accOrbit 5.5s linear infinite; }
  @keyframes accOrbit{to{transform:rotate(360deg)}}
  /* equipped backgrounds for the hero stage */
  .pet-page .pet-stage.bg-night_city{ background:radial-gradient(120% 90% at 50% 12%, rgba(99,102,241,0.22), transparent 60%), linear-gradient(180deg, #141826, transparent); border-radius:var(--r-lg); }
  .pet-page .pet-stage.bg-focus_space{ background:radial-gradient(120% 90% at 50% 18%, rgba(56,189,248,0.20), transparent 58%), radial-gradient(60% 50% at 80% 80%, rgba(167,139,250,0.18), transparent 60%); border-radius:var(--r-lg); }
  .pet-page .pet-stage.bg-aurora_bg{ background:linear-gradient(160deg, rgba(45,212,191,0.16), rgba(167,139,250,0.16) 55%, rgba(56,189,248,0.14)); border-radius:var(--r-lg); }
  /* equipped aura tints */
  .pet-page .pet-aura.aura-focus_flow{ background:radial-gradient(circle, rgba(56,189,248,0.32), transparent 62%); }
  .pet-page .pet-aura.aura-warm_support{ background:radial-gradient(circle, rgba(245,158,11,0.30), transparent 62%); }
  .pet-page .pet-aura.aura-rainbow_aura{ background:conic-gradient(from 0deg, rgba(251,113,133,0.30), rgba(245,182,66,0.30), rgba(45,212,191,0.30), rgba(56,189,248,0.30), rgba(167,139,250,0.30), rgba(251,113,133,0.30)); filter:blur(6px); }
  .pet-page .pet-name{ font-size:30px; font-weight:800; letter-spacing:-0.04em; }
  .pet-page .pet-species{ color:var(--pv2); font-weight:600; font-size:14px; margin-top:2px; }
  .pet-page .lvl-badge{ display:inline-flex; align-items:center; gap:8px; padding:7px 13px; border-radius:999px;
    background:linear-gradient(135deg,var(--pv),var(--pb)); color:#fff; font-weight:700; font-size:14px;
    box-shadow:0 6px 20px var(--pet-glow); }
  .pet-page .pc-foot{ position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .pet-page .mood-chip{ display:inline-flex; align-items:center; gap:8px; padding:6px 13px; border-radius:999px;
    font-weight:600; font-size:13.5px; border:1px solid; }
  .pet-page .mood-focus{ background:rgba(68,147,248,0.12); border-color:rgba(68,147,248,0.34); color:#bcd6fb; }
  .pet-page .hero-side{ display:grid; grid-template-rows:auto auto auto; gap:16px; }
  .pet-page .hstat{ position:relative; padding:18px 20px; border-radius:var(--r-lg);
    background:linear-gradient(180deg,var(--surface),var(--bg-2)); border:1px solid var(--line); overflow:hidden; }
  .pet-page .hstat .lab{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); display:flex; align-items:center; gap:8px; }
  .pet-page .hstat .big{ font-size:30px; font-weight:800; letter-spacing:-0.04em; margin-top:6px; }
  .pet-page .xp-row{ display:flex; justify-content:space-between; align-items:baseline; }
  .pet-page .pet-bar{ height:9px; border-radius:999px; background:var(--surface-3); overflow:hidden; margin-top:10px; position:relative; }
  .pet-page .pet-bar>i{ display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--pv),var(--pc)); position:relative; }
  .pet-page .pet-bar.power>i{ background:linear-gradient(90deg,#f472b6,var(--pv)); }
  .pet-page .pet-bar.glow>i::after{ content:""; position:absolute; inset:0; border-radius:999px; box-shadow:0 0 14px var(--pet-glow); }
  /* species showcase */
  .pet-page .species-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .pet-page .species{ position:relative; border-radius:var(--r-lg); border:1px solid var(--line); background:var(--surface);
    padding:16px; text-align:center; transition:.18s; cursor:pointer; overflow:hidden; }
  .pet-page .species:hover{ transform:translateY(-3px); border-color:var(--line-2); }
  .pet-page .species.active{ border-color:rgba(139,92,246,0.5); background:linear-gradient(180deg,rgba(139,92,246,0.10),transparent); }
  .pet-page .species .glowbg{ position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:160px;height:160px;border-radius:50%; opacity:.5; filter:blur(8px); }
  .pet-page .species .sname{ font-weight:700; font-size:14.5px; position:relative; }
  .pet-page .species .strait{ font-size:11.5px; color:var(--text-faint); margin-top:3px; position:relative; }
  .pet-page .species .sdesc{ font-size:12px; color:var(--text-dim); margin-top:9px; line-height:1.45; position:relative; }
  .pet-page .species .active-tag{ position:absolute; top:12px; right:12px; }
  /* metrics */
  .pet-page .metrics-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .pet-page .metric{ padding:20px; border-radius:var(--r-lg); border:1px solid var(--line);
    background:linear-gradient(180deg,var(--surface),var(--bg-2)); }
  .pet-page .metric .mt{ display:flex; align-items:center; justify-content:space-between; }
  .pet-page .metric .mname{ font-weight:600; font-size:14.5px; display:flex; align-items:center; gap:9px; }
  .pet-page .metric .ic{ width:30px;height:30px;border-radius:9px;display:grid;place-items:center; }
  .pet-page .metric .ic svg{ width:16px;height:16px; }
  .pet-page .metric .pct{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:24px; letter-spacing:-0.03em; margin-top:12px; }
  .pet-page .metric .spark{ margin-top:8px; }
  .pet-page .metric .exp{ font-size:12.5px; color:var(--text-dim); margin-top:12px; line-height:1.5; }
  .pet-page .mtrend{ font-family:'JetBrains Mono',monospace; font-size:12px; display:flex; align-items:center; gap:5px; }
  /* event feed */
  .pet-page .feed-item{ display:flex; gap:14px; padding:13px 0; border-bottom:1px solid var(--line); }
  .pet-page .feed-item:last-child{ border-bottom:0; }
  .pet-page .feed-badge{ flex:none; min-width:62px; height:30px; border-radius:8px; display:grid; place-items:center;
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; }
  .pet-page .fb-pos{ background:rgba(45,212,191,0.14); color:#7de8d6; border:1px solid rgba(45,212,191,0.3); }
  .pet-page .fb-neg{ background:rgba(217,164,65,0.10); color:#e6c98e; border:1px solid rgba(217,164,65,0.22); }
  .pet-page .feed-item .ftxt{ font-size:13.5px; }
  .pet-page .feed-item .fmeta{ font-size:11.5px; color:var(--text-faint); margin-top:2px; }
  /* wellbeing */
  .pet-page .wb-item{ padding:14px 0; border-bottom:1px solid var(--line); }
  .pet-page .wb-item:last-child{ border-bottom:0; }
  .pet-page .wb-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .pet-page .wb-name{ font-weight:600; font-size:13.5px; }
  .pet-page .wb-exp{ font-size:12.5px; color:var(--text-dim); margin-top:6px; line-height:1.45; }
  /* inventory */
  .pet-page .inv-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .pet-page .inv-tab{ padding:7px 14px; border-radius:9px; border:1px solid var(--line-2); background:var(--surface);
    font-weight:600; font-size:13px; color:var(--text-dim); cursor:pointer; transition:.14s; }
  .pet-page .inv-tab:hover{ color:var(--text); }
  .pet-page .inv-tab.active{ background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(34,211,238,0.12));
    border-color:rgba(139,92,246,0.4); color:#fff; }
  .pet-page .inv-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .pet-page .inv-item{ position:relative; border-radius:var(--r-lg); border:1px solid var(--line); background:var(--surface);
    padding:16px; text-align:center; transition:.16s; overflow:hidden; }
  .pet-page .inv-item:hover{ transform:translateY(-2px); }
  .pet-page .inv-tile{ width:62px;height:62px;border-radius:16px; margin:4px auto 12px; display:grid; place-items:center;
    background:var(--surface-2); border:1px solid var(--line-2); position:relative; }
  .pet-page .inv-tile svg{ width:30px;height:30px; }
  .pet-page .inv-name{ font-weight:700; font-size:13px; }
  .pet-page .rar{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    margin-top:3px; font-weight:600; }
  .pet-page .inv-item .act{ margin-top:12px; }
  .pet-page .r-common{ --rc:var(--rc-common); }
  .pet-page .r-rare{ --rc:var(--rc-rare); }
  .pet-page .r-epic{ --rc:var(--rc-epic); }
  .pet-page .r-legendary{ --rc:var(--rc-legendary); }
  .pet-page .inv-item[class*="r-"] .rar{ color:var(--rc); }
  .pet-page .inv-item.owned .inv-tile{ border-color:var(--rc); box-shadow:0 0 22px -6px var(--rc); }
  .pet-page .inv-item.owned .inv-tile svg{ color:var(--rc); }
  .pet-page .inv-item.equipped{ border-color:var(--rc); background:linear-gradient(180deg,rgba(139,92,246,0.10),transparent); }
  .pet-page .inv-item.locked .inv-tile{ filter:grayscale(1); opacity:.45; }
  .pet-page .inv-item.locked .inv-name{ color:var(--text-dim); }
  .pet-page .lock-cond{ font-size:11px; color:var(--text-faint); margin-top:10px; line-height:1.4;
    display:flex; gap:6px; align-items:flex-start; justify-content:center; text-align:center; }
  .pet-page .lock-cond svg{ width:12px;height:12px;flex:none;margin-top:1px; }
  .pet-page .equipped-tag{ position:absolute; top:10px; right:10px; font-family:'JetBrains Mono',monospace; font-size:10px;
    font-weight:700; color:var(--pt); }
  /* battle */
  .pet-page .battle-banner{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    padding:18px 22px; border-radius:var(--r-lg); margin-bottom:14px;
    border:1px solid rgba(245,182,66,0.3);
    background:linear-gradient(120deg, rgba(245,182,66,0.12), rgba(139,92,246,0.10)); }
  .pet-page .battle-banner .reward{ display:flex; align-items:center; gap:12px; }
  .pet-page .battle-banner .rw-ic{ width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
    background:linear-gradient(135deg,#f5b642,#f472b6); color:#1a1208; }
  .pet-page .battle-row{ display:grid; grid-template-columns:42px 1fr auto auto auto; align-items:center; gap:14px;
    padding:12px 14px; border-radius:var(--r); border:1px solid var(--line); background:var(--surface); margin-bottom:8px; transition:.15s; }
  .pet-page .battle-row.me{ border-color:rgba(139,92,246,0.5); background:linear-gradient(90deg,rgba(139,92,246,0.10),transparent); }
  .pet-page .battle-row:hover{ border-color:var(--line-2); }
  .pet-page .br-rank{ font-family:'JetBrains Mono',monospace; font-weight:800; font-size:20px; text-align:center; color:var(--text-faint); }
  .pet-page .br-rank.top{ color:var(--rc-legendary); }
  .pet-page .br-pet{ width:46px;height:46px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line-2);display:grid;place-items:center;overflow:hidden; }
  .pet-page .br-team b{ font-size:14.5px; } .pet-page .br-team .sp{ font-size:11.5px; color:var(--text-dim); }
  .pet-page .br-power{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; }
  /* modal */
  .pet-page .modal-ov{ position:fixed; inset:0; z-index:100; background:rgba(6,6,9,0.72); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; padding:24px; }
  .pet-page .modal-ov.open{ display:flex; }
  .pet-page .modal{ width:560px; max-width:100%; max-height:88vh; overflow:auto; border-radius:var(--r-xl);
    border:1px solid var(--line-2); background:linear-gradient(180deg,var(--surface),var(--bg-2)); box-shadow:var(--shadow-lg); }
  .pet-page .modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; padding:22px 24px 0; }
  .pet-page .modal-body{ padding:18px 24px 24px; }
  .pet-page .x-btn{ width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--text-dim);display:grid;place-items:center; }
  .pet-page .priv-row{ display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--line); }
  .pet-page .priv-row:last-child{ border-bottom:0; }
  .pet-page .priv-row .pinfo{ flex:1; }
  .pet-page .priv-row .pn{ font-size:14px; font-weight:600; }
  .pet-page .priv-row .pd{ font-size:12px; color:var(--text-faint); margin-top:2px; }
  .pet-page .toggle{ width:42px;height:24px;border-radius:999px;background:var(--surface-3);position:relative;cursor:pointer;flex:none;border:1px solid var(--line-2); transition:.16s; }
  .pet-page .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--text-dim);transition:.18s;}
  .pet-page .toggle.on{background:linear-gradient(135deg,var(--pv),var(--pb));border-color:transparent;}
  .pet-page .toggle.on::after{left:20px;background:#fff;}
  .pet-page .seg-mini{display:flex;gap:4px;}
  .pet-page .seg-mini b{padding:5px 11px;border-radius:8px;border:1px solid var(--line-2);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;}
  .pet-page .seg-mini b.on{background:rgba(139,92,246,0.18);border-color:rgba(139,92,246,0.4);color:#fff;}
  .pet-page .priv-note{ display:flex; gap:10px; padding:12px 14px; border-radius:var(--r); background:rgba(139,92,246,0.08);
    border:1px solid rgba(139,92,246,0.22); font-size:12.5px; color:#cdbdf5; margin-top:6px; }
  .pet-page .priv-note svg{ width:16px;height:16px;flex:none;margin-top:1px; }
  /* create state */
  .pet-page .create-wrap{ max-width:920px; margin:0 auto; padding:24px 0 40px; }
  .pet-page .create-head{ text-align:center; margin-bottom:34px; }
  .pet-page .create-head .badge{ display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border-radius:999px;
    background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.3); color:var(--pv2);
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
  .pet-page .create-head h1{ font-size:clamp(28px,4.5vw,42px); margin-top:16px; letter-spacing:-0.04em; }
  .pet-page .create-head h1 span{ background:linear-gradient(90deg,var(--pv2),var(--pc)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .pet-page .create-head p{ color:var(--text-dim); font-size:16px; margin-top:14px; max-width:560px; margin-left:auto; margin-right:auto; }
  .pet-page .pick-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .pet-page .pick{ position:relative; border-radius:var(--r-lg); border:1.5px solid var(--line); background:var(--surface);
    padding:18px 14px; text-align:center; cursor:pointer; transition:.16s; overflow:hidden; }
  .pet-page .pick:hover{ transform:translateY(-3px); border-color:var(--line-2); }
  .pet-page .pick.sel{ border-color:rgba(139,92,246,0.6); background:linear-gradient(180deg,rgba(139,92,246,0.12),transparent);
    box-shadow:0 0 0 1px rgba(139,92,246,0.4), 0 14px 40px -16px var(--pet-glow); }
  .pet-page .pick .glowbg{ position:absolute; top:-26px; left:50%; transform:translateX(-50%); width:150px;height:150px;border-radius:50%; opacity:.45; filter:blur(10px); }
  .pet-page .pick .sel-check{ position:absolute; top:10px; right:10px; width:24px;height:24px;border-radius:50%;
    background:var(--pv); color:#fff; display:none; place-items:center; }
  .pet-page .pick.sel .sel-check{ display:grid; }
  .pet-page .pick .sname{ font-weight:700; font-size:14.5px; position:relative; }
  .pet-page .pick .strait{ font-size:11.5px; color:var(--text-faint); margin-top:3px; position:relative; }
  .pet-page .form-card{ border-radius:var(--r-xl); border:1px solid var(--line-2);
    background:linear-gradient(180deg,var(--surface),var(--bg-2)); box-shadow:var(--shadow-lg); padding:26px; }
  .pet-page .form-grid{ display:grid; grid-template-columns:1.1fr 1fr; gap:26px; align-items:center; }
  .pet-page .preview-stage{ position:relative; min-height:240px; display:grid; place-items:center; border-radius:var(--r-lg);
    background:radial-gradient(circle at 50% 40%, rgba(139,92,246,0.16), transparent 60%); border:1px solid var(--line); overflow:hidden; }
  .pet-page .preview-aura{ position:absolute; width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle, rgba(139,92,246,0.28), transparent 62%); animation:auraPulse 4.5s ease-in-out infinite; }
  .pet-page .preview-pet{ position:relative; z-index:2; animation:petFloat 5s ease-in-out infinite; }
  .pet-page .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text-dim); }
  .pet-page .name-input{ width:100%; height:50px; padding:0 16px; border-radius:12px; background:var(--bg);
    border:1px solid var(--line-2); color:var(--text); font-size:18px; font-weight:600; }
  .pet-page .name-input:focus{ outline:none; border-color:rgba(139,92,246,0.5); }
  .pet-page .desc-line{ font-size:13.5px; color:var(--text-dim); margin-top:16px; line-height:1.5; }
  .pet-page .create-btn{ background:linear-gradient(135deg,var(--pv),var(--pb)); border:0; color:#fff; box-shadow:0 10px 30px var(--pet-glow); }
