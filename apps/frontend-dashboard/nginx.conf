server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
