name: grey-cardinal

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grey_cardinal}
      POSTGRES_USER: ${POSTGRES_USER:-grey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grey}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grey} -d ${POSTGRES_DB:-grey_cardinal}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    env_file:
      - path: .env.production
        required: false
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  asr-service:
    build:
      context: apps/asr-service
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-small}
    env_file:
      - path: .env.production
        required: false
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
    expose:
      - "8030"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  tg-proxy:
    build:
      context: apps/tg-proxy
      dockerfile: Dockerfile
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    expose:
      - "8888"
    restart: unless-stopped

  # Outbound VPN egress for LLM traffic. The RU server IP is geo-blocked by
  # Groq (403); sing-box dials foreign Hysteria2 exits and exposes a local
  # mixed HTTP/SOCKS proxy on :8889. brain-api routes ONLY Groq through it via
  # LLM_PROXY. OpenRouter fallback goes direct (reachable from RU).
  vpn-proxy:
    build:
      context: apps/vpn-proxy
      dockerfile: Dockerfile
    env_file:
      - path: .env.production
        required: false
    expose:
      - "8889"
    restart: unless-stopped

  brain-api:
    build:
      context: .
      dockerfile: apps/brain-api/Dockerfile
    env_file:
      - path: .env.production
        required: false
    environment:
      APP_ENV: production
      LLM_LOCAL_BASE_URL: ${LLM_LOCAL_BASE_URL:-http://ollama:11434/v1}
      # Groq egress through the VPN proxy; OpenRouter fallback stays direct.
      LLM_PROXY: ${LLM_PROXY:-http://vpn-proxy:8889}
      UPLOADS_DIR: /data/uploads
    expose:
      - "8000"
    volumes:
      - brain_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      vpn-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    env_file:
      - path: .env.production
        required: false
    environment:
      APP_ENV: production
      TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
      HTTPS_PROXY: http://tg-proxy:8888
      NO_PROXY: brain-api,localhost,127.0.0.1
    expose:
      - "8010"
    depends_on:
      brain-api:
        condition: service_healthy
      tg-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  audio-worker:
    build:
      context: .
      dockerfile: apps/audio-worker/Dockerfile
    env_file:
      - path: .env.production
        required: false
    environment:
      AUDIO_ASR_PROVIDER: ${AUDIO_ASR_PROVIDER:-http}
      ASR_SERVICE_URL: http://asr-service:8030
    expose:
      - "8020"
    depends_on:
      brain-api:
        condition: service_healthy
      asr-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    expose:
      - "5173"
    depends_on:
      - brain-api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - path: .env.production
        required: false
    environment:
      DOMAIN: ${DOMAIN:-fishingteam.su}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - brain-api
      - telegram-bot
      - audio-worker
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  brain_uploads:
  ollama_data:
  caddy_data:
  caddy_config:
