name: Build Windows tray agent MSI

on:
  workflow_dispatch:
  push:
    paths:
      - "native/tray-agent/**"
      - "scripts/package_windows_tray_msi.ps1"
      - ".github/workflows/build-daemon-installers.yml"

jobs:
  windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Install tray-agent build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r native/tray-agent/requirements.txt pyinstaller
      - name: Build tray agent MSI
        shell: pwsh
        run: ./scripts/package_windows_tray_msi.ps1 -Version 0.6.2
      - uses: actions/upload-artifact@v4
        with:
          name: grey-cardinal-agent-windows-x64
          path: apps/frontend/public/downloads/GreyCardinalAgent-x64.msi
