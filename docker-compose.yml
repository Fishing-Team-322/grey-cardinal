name: grey-cardinal

services:
  brain-api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/brain-api/Dockerfile
    environment:
      INTERNAL_API_TOKEN: dev-internal-token
    ports:
      - "8010:8010"

  audio-worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/audio-worker/Dockerfile
    environment:
      INTERNAL_API_TOKEN: dev-internal-token
      BRAIN_API_BASE_URL: http://brain-api:8010
      AUDIO_ASR_PROVIDER: mock
      AUDIO_MOCK_TEXT: "Петя, сделай оплату к четвергу"
      AUDIO_WORKER_SAVE_CHUNKS: "false"
      AUDIO_WORKER_CHUNKS_DIR: /tmp/grey-cardinal-audio-chunks
    ports:
      - "8020:8020"
    depends_on:
      - brain-api
