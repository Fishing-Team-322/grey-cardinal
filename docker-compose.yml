name: grey-cardinal

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grey_cardinal}
      POSTGRES_USER: ${POSTGRES_USER:-grey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grey}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grey} -d ${POSTGRES_DB:-grey_cardinal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  brain-api:
    build:
      context: .
      dockerfile: apps/brain-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://grey:grey@postgres:5432/grey_cardinal}
      TELEGRAM_BOT_BASE_URL: ${TELEGRAM_BOT_BASE_URL:-http://telegram-bot:8010}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      BOARD_PROVIDER: ${BOARD_PROVIDER:-mock}
      YOUGILE_ENABLED: ${YOUGILE_ENABLED:-false}
      YOUGILE_API_BASE_URL: ${YOUGILE_API_BASE_URL:-https://ru.yougile.com}
      YOUGILE_API_KEY: ${YOUGILE_API_KEY:-}
      YOUGILE_COMPANY_ID: ${YOUGILE_COMPANY_ID:-}
      YOUGILE_PROJECT_ID: ${YOUGILE_PROJECT_ID:-}
      YOUGILE_BOARD_ID: ${YOUGILE_BOARD_ID:-}
      YOUGILE_COLUMN_BACKLOG_ID: ${YOUGILE_COLUMN_BACKLOG_ID:-}
      YOUGILE_COLUMN_TODO_ID: ${YOUGILE_COLUMN_TODO_ID:-}
      YOUGILE_COLUMN_IN_PROGRESS_ID: ${YOUGILE_COLUMN_IN_PROGRESS_ID:-}
      YOUGILE_COLUMN_REVIEW_ID: ${YOUGILE_COLUMN_REVIEW_ID:-}
      YOUGILE_COLUMN_BLOCKED_ID: ${YOUGILE_COLUMN_BLOCKED_ID:-}
      YOUGILE_COLUMN_DONE_ID: ${YOUGILE_COLUMN_DONE_ID:-}
      YOUGILE_USER_MAP: ${YOUGILE_USER_MAP:-}
      REMINDER_DEADLINE_HOURS_BEFORE: ${REMINDER_DEADLINE_HOURS_BEFORE:-2}
      REMINDER_STALE_HOURS: ${REMINDER_STALE_HOURS:-24}
      MORNING_SUMMARY_HOUR: ${MORNING_SUMMARY_HOUR:-9}
      EVENING_DIGEST_HOUR: ${EVENING_DIGEST_HOUR:-20}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      DEFAULT_WORKSPACE_NAME: ${DEFAULT_WORKSPACE_NAME:-Hackathon Team}
      DEFAULT_TELEGRAM_CHAT_ID: ${DEFAULT_TELEGRAM_CHAT_ID:-}
      TASK_EXTRACTION_MIN_CONFIDENCE: ${TASK_EXTRACTION_MIN_CONFIDENCE:-0.65}
      TASK_EXTRACTION_REQUIRE_ACTION_VERB: ${TASK_EXTRACTION_REQUIRE_ACTION_VERB:-true}
      DUPLICATE_SIMILARITY_THRESHOLD: ${DUPLICATE_SIMILARITY_THRESHOLD:-0.72}
      REMINDER_MIN_INTERVAL_MINUTES: ${REMINDER_MIN_INTERVAL_MINUTES:-120}
      REMINDER_MAX_DAILY_PER_USER: ${REMINDER_MAX_DAILY_PER_USER:-3}
      REMINDER_QUIET_HOURS_START: ${REMINDER_QUIET_HOURS_START:-22:00}
      REMINDER_QUIET_HOURS_END: ${REMINDER_QUIET_HOURS_END:-09:00}
      DEMO_CORE_AUTO_CONFIRM: ${DEMO_CORE_AUTO_CONFIRM:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_PUBLIC_BASE_URL: ${TELEGRAM_PUBLIC_BASE_URL:-}
      BRAIN_API_BASE_URL: ${BRAIN_API_BASE_URL:-http://brain-api:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8010:8010"
    depends_on:
      brain-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  audio-worker:
    build:
      context: .
      dockerfile: apps/audio-worker/Dockerfile
    profiles: ["backend", "full"]
    environment:
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      BRAIN_API_BASE_URL: ${BRAIN_API_BASE_URL:-http://brain-api:8000}
      AUDIO_ASR_PROVIDER: ${AUDIO_ASR_PROVIDER:-mock}
      AUDIO_MOCK_TEXT: ${AUDIO_MOCK_TEXT:-Петя, сделай оплату к четвергу}
      AUDIO_WORKER_SAVE_CHUNKS: ${AUDIO_WORKER_SAVE_CHUNKS:-false}
      AUDIO_WORKER_CHUNKS_DIR: ${AUDIO_WORKER_CHUNKS_DIR:-/tmp/grey-cardinal-audio-chunks}
      AUDIO_FASTER_WHISPER_MODEL: ${AUDIO_FASTER_WHISPER_MODEL:-base}
    ports:
      - "8020:8020"
    depends_on:
      brain-api:
        condition: service_healthy

  frontend-dashboard:
    build:
      context: apps/frontend-dashboard
      dockerfile: Dockerfile
    profiles: ["full"]
    ports:
      - "5173:5173"
    depends_on:
      - brain-api

  caddy:
    image: caddy:2-alpine
    profiles: ["full"]
    ports:
      - "8080:80"
    volumes:
      - ./apps/frontend-dashboard/Caddyfile.proxy:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend-dashboard
      - brain-api

  # Real ASR service for desktop-agent faster_whisper_http provider.
  # Usage: docker compose --profile desktop up asr-service
  # Agent config: asr_provider = "faster_whisper_http"
  #               asr_url      = "http://localhost:8030/transcribe"
  asr-service:
    build:
      context: apps/asr-service
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-base}
    profiles: ["desktop", "full"]
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
    ports:
      - "8030:8030"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
