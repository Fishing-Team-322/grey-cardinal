# Корневой pyproject — общая конфигурация инструментов для всего монорепозитория.
# Каждый Python-сервис (brain-api, telegram-bot, audio-worker) и пакет contracts
# имеют собственный pyproject со своими зависимостями. Здесь только tooling.

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "apps/brain-api/alembic/versions",
    "apps/frontend-dashboard",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "B008",  # FastAPI Depends() в аргументах по умолчанию — это нормальный паттерн
]

[tool.ruff.lint.isort]
known-first-party = ["brain_api", "telegram_bot", "audio_worker", "grey_cardinal_contracts"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
ignore_missing_imports = true
disallow_untyped_defs = false
plugins = ["pydantic.mypy"]
exclude = [
    "apps/brain-api/alembic",
    "build",
    "dist",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["apps/brain-api/tests", "apps/telegram-bot/tests", "packages/contracts/python/tests"]
filterwarnings = ["ignore::DeprecationWarning"]
